name: hex-crud-env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  # Core & Async I/O
  - redis>=5.0.0
  - httpx>=0.27.0
  # Testing & QA
  - pytest>=8.0
  - pytest-asyncio>=0.23
  - coverage>=7.0
  # Linting & Type Checking
  - ruff>=0.4
  - mypy>=1.10
  - pre-commit>=3.0
  - pip
  - pip:
      # Framework & Async Ecosystem (versiones más recientes vía pip)
      - fastapi>=0.115.0
      - uvicorn[standard]>=0.30.0
      - pydantic>=2.0
      - pydantic-settings>=2.0
      - aiokafka>=0.11.0
      - elasticsearch[async]>=8.10.0
      - structlog>=24.0.0
      # Integration Testing (spin-up de infraestructura real en CI/local)
      - testcontainers[redis,kafka,elasticsearch]>=4.0
