services:
  app:
    build: .
    container_name: hex-crud-api
    ports: ["8000:8000"]
    env_file: .env
    depends_on:
      valkey: {condition: service_healthy}
      kafka: {condition: service_healthy}
      elasticsearch: {condition: service_healthy}
    networks: [app_net]
    deploy:
      resources:
        limits: {cpus: "0.50", memory: 256M}
    environment:
      - PYTHONPATH=/app
      - UVICORN_WORKERS=2

  valkey:
    image: valkey/valkey:8-alpine
    container_name: valkey-cache
    command: valkey-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks: [app_net]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-broker
    hostname: kafka
    environment:
      # === KRaft Mode (Sin ZooKeeper) ===
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      # === Cluster ID (OBLIGATORIO - genera uno único) ===
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2kQ
      - KAFKA_CLUSTER_ID=MkU3OEVBNTcwNTJENDM2kQ
      # === Replicación para single-node ===
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      # === Desarrollo ===
      - KAFKA_LOG_RETENTION_HOURS=24
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_BROKER_ID=1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s  # Confluent JVM necesita más tiempo para iniciar KRaft
    networks: [app_net]

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: es-logging
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx512m
      - xpack.security.enabled=false
    ports: ["9200:9200"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [app_net]

networks:
  app_net:
    driver: bridge
    name: hex-crud-net
